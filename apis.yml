  - REST
  image: https://raw.githubusercontent.com/api-evangelist/blue-yonder/refs/heads/main/image.png
  humanURL: https://blueyonder.com/
  baseURL: https://api.blueyonder.example.com
  properties:
  - url: https://blueyonder.com/solutions/blue-yonder-platform
    type: Documentation
  description: >-
    The Blue Yonder Transportation Management API enables access to transportation planning, carrier management, load optimization, and freight audit capabilities. REST APIs support carrier connectivity, shipment tracking, and transportation cost optimization across multimodal freight networks.

- aid: blue-yonder:blue-yonder-connect-api
