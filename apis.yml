- aid: blue-yonder:blue-yonder-demand-planning-api
  name: Blue Yonder Demand Planning API
  tags:
  - Supply Chain
  - Demand Planning
  - Forecasting
  - Retail
  - REST
  image: https://raw.githubusercontent.com/api-evangelist/blue-yonder/refs/heads/main/image.png
  humanURL: https://blueyonder.com/
  baseURL: https://api.blueyonder.example.com
  properties:
  - url: https://blueyonder.com/solutions/blue-yonder-platform
    type: Documentation
  description: >-
    The Blue Yonder Demand Planning API enables access to demand forecasting models, statistical baselines, and demand signals for retail and manufacturing supply chains. REST APIs support integration with ERP and POS systems for demand sensing, shaping, and response workflows.

